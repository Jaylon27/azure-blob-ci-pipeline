name: CI Pipeline

on:
  push:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ruff
        run: ruff check src/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        shell: bash
        run: |
          set -o pipefail
          pytest tests/ --junitxml=test-results.xml | tee pytest-output.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: |
            test-results.xml
            pytest-output.txt
          if-no-files-found: warn

      - name: Run adls_client.py end-to-end
        run: python src/adls_client.py
  dev:
    runs-on: ubuntu-latest
    needs: test
    environment: dev
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          use: true
      
      - name: Log in to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ghapractice.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghapractice.azurecr.io/adls-client:${{ github.sha }}
          cache-from: type=registry,ref=ghapractice.azurecr.io/adls-client:buildcache
          cache-to: type=registry,ref=ghapractice.azurecr.io/adls-client:buildcache,mode=max
      

      

